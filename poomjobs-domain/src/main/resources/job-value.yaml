JobValue:
  category: string
  name: string
  attemptCount: long

  arguments:
    $list: string
  result: string

  status:
    run:
      $enum: PENDING, RUNNING, DONE
    exit:
      $enum: SUCCESS, FAILURE, ABORTED
    retriedByJob: string

  runner: $JobRunnerMetaData

  processing:
    submitted: date-time
    started: date-time
    finished: date-time

  accounting:
    accountId: string
    extension: string

  context:
    $value-object: org.codingmatters.value.objects.values.ObjectValue

JobRunnerMetaData:
  runner-id: string
  idempotent: bool
